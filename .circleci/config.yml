version: 2.1

orbs:
  aws_assume_role: lbh-hackit/aws_assume_role@0.1.0
  node: circleci/node@6.3.0

executors:
  docker-python:
    docker:
      - image: circleci/python:3.7
  docker-terraform:
    docker:
      - image: "hashicorp/terraform:light"
  docker-dotnet:
    docker:
      - image: mcr.microsoft.com/dotnet/sdk:8.0

references:
  workspace_root: &workspace_root "~"
  attach_workspace: &attach_workspace
    attach_workspace:
      at: *workspace_root

commands:
  assume-role-and-persist-workspace:
    description: "Assumes deployment role and persists credentials across jobs"
    parameters:
      aws-account:
        type: string
    steps:
      - checkout
      - aws_assume_role/assume_role:
          account: <<parameters.aws-account>>
          profile_name: default
          role: "LBH_Circle_CI_Deployment_Role"
      - persist_to_workspace:
          root: *workspace_root
          paths:
            - .aws
  deploy-lambda:
    description: "Deploys API via Serverless"
    parameters:
      stage:
        type: string
    steps:
      - *attach_workspace
      - checkout
      - setup_remote_docker
      - node/install
      - run:
          name: Install serverless CLI
          command: npm i -g serverless
      - run:
          name: Install step function plugin
          command: npm i serverless-step-functions
      - run:
          name: Build lambda
          command: |
            cd ./HousingFinanceInterimApi/
            chmod +x ./build.sh
            ./build.sh
      - run:
          name: Deploy lambda
          no_output_timeout: 45m
          command: |
            cd ./HousingFinanceInterimApi/
            npm i serverless-associate-waf serverless-prune-plugin
            sls deploy --stage <<parameters.stage>>

jobs:
  check-code-formatting:
    executor: docker-dotnet
    steps:
      - checkout
      - run:
          name: Install dotnet format
          command: dotnet tool install dotnet-format --tool-path ./dotnet-format-local/
      - run:
          name: Run formatter check
          command: ./dotnet-format-local/dotnet-format --check

  assume-role-dr:
    executor: docker-python
    steps:
      - assume-role-and-persist-workspace:
          aws-account: $AWS_ACCOUNT_DISASTER_RECOVERY

  deploy-to-dr:
    executor: docker-dotnet
    steps:
      - deploy-lambda:
          stage: "production"

workflows:
  check-and-dr:
    jobs:
      - permit-dr-release:
          type: approval
      - assume-role-dr:
          context: api-assume-role-disaster-recovery-context
          requires:
            - permit-dr-release
      - deploy-to-dr:
          context:
            - api-nuget-token-context
            - "Serverless Framework"
          requires:
            - permit-dr-release
            - assume-role-dr
